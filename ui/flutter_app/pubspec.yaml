name: tg_mod
description: Modified Telegram client for Flutter

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # API & HTTP
  http: ^1.1.0
  dio: ^5.3.1
  
  # State management
  provider: ^6.0.0
  riverpod: ^2.4.0
  
  # UI
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  
  # Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  
  # Utils
  path_provider: ^2.1.1
  permission_handler: ^11.4.4
  device_info_plus: ^9.1.1
  
  # Testing
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
